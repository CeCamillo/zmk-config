# --- Power management ---
# Deep sleep after 15 min of inactivity (ms). Lower = saves more battery, higher = less wake lag.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Battery reporting cadence (seconds). Default 60. Doubling halves BLE radio work for battery reads.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=120

# --- BLE connection-interval prefs (peripheral side: keyboard talking to host) ---
# Units of 1.25 ms. Higher interval = less radio activity = better battery, slightly higher latency.
# Min 12 (15 ms) / Max 24 (30 ms) is a good balance — typing still feels instant.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- Combo & macro limits (raise if you add many) ---
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=4
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4
